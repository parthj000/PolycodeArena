services:
  mongo:
    image: mongo
    container_name: mongodb
    networks:
      - polycode-internal
    restart: always

  server:
    build: ./server
    container_name: server
    env_file:
      - ./server/.env
    ports:
      - "8080:8080"
    networks:
      - polycode-internal
    depends_on:
      - mongo
    restart: always

  # code-execution-engine:
  #   build: ./code_execution_engine
  #   container_name: polycode_code_execution_engine
  #   ports:
  #     - "9000:8080"
  #   networks:
  #     - polycode-internal
  #   depends_on:
  #     - server
  #   restart: always

  client:
    build: ./client
    container_name: client
    env_file:
      - ./client/.env
    ports:
      - "3000:3000"
    restart: always

networks:
  polycode-internal:
